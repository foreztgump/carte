name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm -r lint

      - run: pnpm -r build --if-present

      - run: pnpm -r test

      - name: AgentShield scan (.factory)
        run: npx --yes ecc-agentshield scan -p .factory/
        continue-on-error: true # remove once AgentShield baseline is clean

      - name: AgentShield scan (.claude)
        run: npx --yes ecc-agentshield scan -p .claude/
        continue-on-error: true # remove once AgentShield baseline is clean
