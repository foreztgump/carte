name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Sandboxed plugin packaging gate. Validates the manifest against the
      # plugin-cli schema and builds the descriptor for the converted packages.
      # M1: @carte/core only. M2 extends this to reservations + orders-backend.
      - name: Validate and build sandboxed plugins (plugin-cli)
        run: |
          pnpm -F @carte/core exec emdash-plugin validate
          pnpm -F @carte/core exec emdash-plugin build
          ls packages/core/dist/index.mjs packages/core/dist/plugin.mjs packages/core/dist/manifest.json

      - run: pnpm -r typecheck

      - run: pnpm -r lint

      - run: pnpm -r build --if-present

      - run: pnpm -r test

      - name: AgentShield scan
        run: |
          npx --yes ecc-agentshield scan -p packages/
          npx --yes ecc-agentshield scan -p .factory/
          npx --yes ecc-agentshield scan -p .claude/
