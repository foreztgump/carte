name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Sandboxed plugin packaging gate. For each converted package: validate the
      # manifest against the plugin-cli schema, build the descriptor, and bundle
      # the dist/<slug>-<version>.tar.gz tarball. `bundle` re-runs validation and
      # rejects undeclared capabilities, network:request with empty allowedHosts,
      # and Node built-in imports. plugin-cli exit code is unreliable when piped,
      # so dist/ contents are asserted explicitly with `ls`. No registry ops
      # (login/publish) run here — offline build/validate/bundle only.
      - name: Validate, build, and bundle sandboxed plugins (plugin-cli)
        run: |
          for pkg in core reservations orders-backend; do
            echo "::group::@carte/$pkg"
            pnpm -F "@carte/$pkg" exec emdash-plugin validate
            pnpm -F "@carte/$pkg" exec emdash-plugin build
            ls "packages/$pkg/dist/index.mjs" "packages/$pkg/dist/plugin.mjs" "packages/$pkg/dist/manifest.json"
            pnpm -F "@carte/$pkg" exec emdash-plugin bundle
            ls "packages/$pkg"/dist/*.tar.gz
            echo "::endgroup::"
          done

      - name: Upload sandboxed plugin bundles
        uses: actions/upload-artifact@v4
        with:
          name: sandboxed-plugin-bundles
          path: packages/*/dist/*.tar.gz
          if-no-files-found: error

      - run: pnpm -r typecheck

      - run: pnpm -r lint

      - run: pnpm -r build --if-present

      - run: pnpm -r test

      # Grep gates (PRO-848 acceptance #3): fail if obsolete pre-0.18 plugin
      # patterns (sandbox-entry, tender:payment, atomicDecrement, adminEntry,
      # plugin-def `as never`, "trusted", etc.) reappear in plugin source.
      - name: Grep gates (obsolete plugin patterns)
        run: ./scripts/check-grep-gates.sh

      - name: AgentShield scan
        run: |
          npx --yes ecc-agentshield scan -p packages/
          npx --yes ecc-agentshield scan -p .factory/
          npx --yes ecc-agentshield scan -p .claude/
