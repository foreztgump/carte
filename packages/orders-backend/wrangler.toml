name = "carte-orders-backend"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Secrets read from .dev.vars at runtime (NOT real values — see
# .dev.vars.example at repo root for the canonical name list):
#   - STRIPE_SECRET_KEY      (Stripe API key for checkout session creation)
#   - STRIPE_WEBHOOK_SECRET  (signing secret for webhook idempotency)
#   - STRIPE_PUBLIC_KEY      (publishable key forwarded to the storefront)

# KV bindings — placeholder ids; the deploy mission will substitute real
# 32-character hex ids produced by `wrangler kv:namespace create PLUGIN_KV`.
# This plugin uses KV for Stripe webhook idempotency
# (`idempotency:{stripeEventId}` keys with 7-day TTL).
[[kv_namespaces]]
binding = "PLUGIN_KV"
id = "PLACEHOLDER_KV_ID"
preview_id = "PLACEHOLDER_PREVIEW_KV_ID"

# Per-env overrides. Empty bodies inherit the top-level config.
[env.development]
[env.preview]
[env.production]
